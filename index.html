<!DOCTYPE html>
<html>
<head>
  <title>Olivo - After School Learning</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f7f2;
      text-align: center;
      padding: 20px;
    }

    .card {
      background: white;
      padding: 20px;
      margin: auto;
      width: 300px;
      border-radius: 12px;
      box-shadow: 0px 2px 10px rgba(0,0,0,0.1);
    }

    button {
      display: block;
      width: 100%;
      margin: 10px 0;
      padding: 10px;
      border: none;
      border-radius: 8px;
      background: #7bae7f;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    button:hover {
      background: #5f8f63;
    }

    .hidden {
      display: none;
    }

    h1 {
      color: #4a6b4d;
    }
  </style>
</head>

<body>

<h1>🌿 Olivo</h1>
<p>After School Learning (15 min fun)</p>

<div class="card">

  <div id="startScreen">
    <h2>Ready to start?</h2>
    <button onclick="startQuiz()">Start Learning</button>
  </div>

  <div id="quizScreen" class="hidden">
    <h3 id="question"></h3>

    <button onclick="checkAnswer(0)" id="opt0"></button>
    <button onclick="checkAnswer(1)" id="opt1"></button>
    <button onclick="checkAnswer(2)" id="opt2"></button>
  </div>

  <div id="resultScreen" class="hidden">
    <h2>🎉 Great Job!</h2>
    <p id="scoreText"></p>
    <button onclick="restart()">Try Again</button>
  </div>

</div>

<script>
const quiz = [
  {
    q: "5 + 3 = ?",
    options: ["5", "8", "9"],
    answer: 1
  },
  {
    q: "10 - 4 = ?",
    options: ["6", "5", "7"],
    answer: 0
  },
  {
    q: "2 x 3 = ?",
    options: ["5", "6", "7"],
    answer: 1
  },
  {
    q: "Which is even number?",
    options: ["3", "7", "8"],
    answer: 2
  }
];

let current = 0;
let score = 0;

function startQuiz() {
  document.getElementById("startScreen").classList.add("hidden");
  document.getElementById("quizScreen").classList.remove("hidden");
  loadQuestion();
}

function loadQuestion() {
  let q = quiz[current];
  document.getElementById("question").innerText = q.q;
  document.getElementById("opt0").innerText = q.options[0];
  document.getElementById("opt1").innerText = q.options[1];
  document.getElementById("opt2").innerText = q.options[2];
}

function checkAnswer(i) {
  if (i === quiz[current].answer) {
    score++;
  }

  current++;

  if (current < quiz.length) {
    loadQuestion();
  } else {
    showResult();
  }
}

function showResult() {
  document.getElementById("quizScreen").classList.add("hidden");
  document.getElementById("resultScreen").classList.remove("hidden");
  document.getElementById("scoreText").innerText =
    "You scored " + score + " / " + quiz.length;
}

function restart() {
  current = 0;
  score = 0;
  document.getElementById("resultScreen").classList.add("hidden");
  document.getElementById("startScreen").classList.remove("hidden");
}
</script>

</body>
</html>
